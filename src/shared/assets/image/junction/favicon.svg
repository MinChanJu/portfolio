<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)" />

  <!-- Road junction: horizontal road -->
  <rect x="4" y="25" width="22" height="14" rx="4" fill="white" opacity="0.9" />
  <rect x="38" y="25" width="22" height="14" rx="4" fill="white" opacity="0.9" />

  <!-- Road junction: vertical road -->
  <rect x="25" y="4" width="14" height="22" rx="4" fill="white" opacity="0.9" />
  <rect x="25" y="38" width="14" height="22" rx="4" fill="white" opacity="0.9" />

  <!-- Center intersection square -->
  <rect x="22" y="22" width="20" height="20" rx="3" fill="white" />

  <!-- Center dot accent -->
  <circle cx="32" cy="32" r="5" fill="#6366f1" />
  <circle cx="32" cy="32" r="2.5" fill="white" />
</svg>